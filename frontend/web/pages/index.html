<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мир</title>
    <link rel="stylesheet" href="../static/style.css">
    <link rel="stylesheet" href="../static/chat.css">
    <link rel="stylesheet" href="../static/message.css">
    <link rel="stylesheet" href="../static/app_header.css">
    <script src="/static/config.js"></script>

<body>

<aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav">
        <ul>
            <li><a href="/profile">Профиль</a></li>
            <li>
                <button>Создать группу</button>

            <li>
                <button>Избранное</button>
            </li>
            <li>
                <button>Настройки</button>
            </li>
        </ul>
    </nav>
</aside>

<div class="overlay" id="overlay"></div>

<div class="modal" id="createGroupModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Создать новую группу</h2>
            <button class="modal-close" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body">
            <form id="createGroupForm">
                <div class="form-group">
                    <label for="groupTitle">Название группы:</label>
                    <input
                            type="text"
                            id="groupTitle"
                            name="title"
                            placeholder="Введите название группы"
                            required
                            autocomplete="off"
                    >
                </div>
                <div class="form-group">
                    <small>Название должно быть уникальным и не пустым</small>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="modal-btn cancel-btn" id="cancelModalBtn">Отмена</button>
            <button class="modal-btn create-btn" id="submitGroupBtn">Создать</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay"></div>

<div class="app-header">
    <div class="menu-name">
        <div class="burger" id="burgerBtn">
            <button class="burger-inner">
                <svg viewBox="0 0 24 24">
                    <rect y="4" width="24" height="3" rx="1.5"/>
                    <rect y="10.5" width="24" height="3" rx="1.5"/>
                    <rect y="17" width="24" height="3" rx="1.5"/>
                </svg>
            </button>
        </div>
        <a class="app-name" href="/">Мир</a>
    </div>
    <a class="profile-name" href="/profile">Егор</a>
</div>

<div class="chat-section">
    <div class="chats">
        <div class="no-chats-yet" style="display: none;">У вас пока нет чатов, вы можете начать общение с людьми из ваших
            контактов.
        </div>
        <div class="chats-loading">Загрузка...</div>

    <div class="actual-chat">
        <div class="select-chat">Выберите чат для начала общения.</div>

</div>
