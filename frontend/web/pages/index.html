<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мир</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../static/style.css">
    <link rel="stylesheet" href="../static/chat.css">
    <link rel="stylesheet" href="../static/message.css">
    <link rel="stylesheet" href="../static/app_header.css">
    <script src="/static/mobile_chat_navigation.js" type="module"></script>
    <script src="/static/load_chats.js" type="module"></script>
    <script src="/static/create_group.js" type="module"></script>
    <script src="/static/delete_group.js" type="module"></script>
    <script src="/static/messages.js" type="module"></script>
</head>
<body>

<aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav">
        <ul>
            <li><a href="/profile">Профиль</a></li>
            <li>
                <button id="createGroupBtn" class="create-group-btn">Создать группу</button>
            </li>
            <li>
                <button>Создать канал</button>
            </li>
            <li>
                <button>Избранное</button>
            </li>
            <li>
                <button>Настройки</button>
            </li>
        </ul>
    </nav>
</aside>

<div class="overlay" id="overlay"></div>

<div class="modal" id="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Создать группу</h2>
        </div>
        <div class="modal-body">
            <form id="createGroupForm">
                <div class="form-group">
                    <input
                            type="text"
                            id="groupTitle"
                            name="title"
                            placeholder="Введите название группы"
                            required
                            autocomplete="off"
                    >
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="modal-btn cancel-btn" id="cancelModalBtn">Отмена</button>
            <button class="modal-btn create-btn" id="submitGroupBtn">Создать</button>
        </div>
    </div>
</div>

<div class="app-header">
    <div class="menu-name">
        <div class="burger" id="burgerBtn">
            <button class="burger-inner">
                <svg viewBox="0 0 24 24">
                    <rect y="4" width="24" height="3" rx="1.5"/>
                    <rect y="10.5" width="24" height="3" rx="1.5"/>
                    <rect y="17" width="24" height="3" rx="1.5"/>
                </svg>
            </button>
        </div>
        <a class="app-name" href="/">Мир</a>
    </div>
    <a class="profile-name" href="/profile">Егор</a>
</div>

<div class="chat-section">
    <div class="chats">
        <div class="no-chats-yet" style="display: none;">У вас пока нет чатов, вы можете начать общение с людьми из ваших
            контактов.
        </div>
        <div class="chats-loading">Загрузка...</div>
    </div>
    <div class="resizer"></div>

    <div class="actual-chat">
        <div class="chat-header" style="display: none;">
            <button class="close-chat-btn">&#8592;</button>
            <img src="../static/favicon.ico" alt="avatar" class="chat-avatar">
            <div class="chat-title">Название чата</div>
        </div>
        <div class="select-chat">Выберите чат для начала общения.</div>
        <div class="messages-container"></div>
        <div class="chat-input" style="display: none;">
            <input type="text" class="message-input" placeholder="Введите сообщение..." autocomplete="off"/>
            <button class="send-message-btn">Отправить</button>
        </div>
    </div>
</div>

<script src="../static/resizer.js" type="module"></script>
<script src="/static/app_header.js"></script>
<script src="/static/modal.js" type="module"></script>
<script src="/static/chat_info.js" type="module"></script>
<script src="/static/check_auth.js" type="module"></script>
</body>
</html>
