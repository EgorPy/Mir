<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мир</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/chat.css">
    <link rel="stylesheet" href="/static/css/message.css">
    <link rel="stylesheet" href="/static/css/app_header.css">
    <script>window.WS_NONCE = "{{ ws_nonce }}"</script>
    <script src="/static/js/config.js" type="module"></script>
    <script src="/static/js/visual/mobile_chat_navigation.js" type="module"></script>
    <script src="/static/js/functional/on_load.js" type="module"></script>
    <script src="/static/js/functional/load_chats.js" type="module"></script>
    <script src="/static/js/functional/create_group.js" type="module"></script>
    <script src="/static/js/functional/delete_group.js" type="module"></script>
    <script src="/static/js/functional/open_chat.js" type="module"></script>
    <script src="/static/js/fetch/is_member.js" type="module"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
</head>
<body>

<aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav">
        <ul>
            <li><button onclick="window.location.href='/profile'">Профиль</button></li>
            <li>
                <button id="createGroupBtn" class="create-group-btn">Создать группу</button>
            </li>
            <li>
                <button onclick="window.location.href='/roll'">Ролл!</button>
            </li>
            <li>
                <button>Создать канал</button>
            </li>
            <li>
                <button>Избранное</button>
            </li>
            <li>
                <button>Настройки</button>
            </li>
        </ul>
    </nav>
</aside>

<div class="overlay" id="overlay"></div>

<div class="modal" id="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Создать группу</h2>
        </div>
        <div class="modal-body">
            <form id="createGroupForm">
                <div class="form-group">
                    <input
                            type="text"
                            id="groupTitle"
                            name="title"
                            placeholder="Введите название группы"
                            required
                            autocomplete="off"
                    >
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="modal-btn cancel-btn" id="cancelModalBtn">Отмена</button>
            <button class="modal-btn create-btn" id="submitGroupBtn">Создать</button>
        </div>
    </div>
</div>

<div class="app-header">
    <div class="menu-name">
        <div class="burger" id="burgerBtn">
            <button class="burger-inner">
                <svg viewBox="0 0 24 24">
                    <rect y="4" width="24" height="3" rx="1.5"/>
                    <rect y="10.5" width="24" height="3" rx="1.5"/>
                    <rect y="17" width="24" height="3" rx="1.5"/>
                </svg>
            </button>
        </div>
        <a class="app-name" href="/">Мир</a>
        <input type="text" placeholder="Поиск" id="searchChatPublicId">
    </div>
    <a class="profile-name" href="/profile" id="profileName">Профиль</a>
    <div class="lens" id="lens">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
    </div>
</div>

<div class="chat-section">
    <div class="chats" id="chats">
        <div id="searchChatsSearching" style="display: none;">Идёт поиск...</div>
        <div id="searchChatsNotFound" style="display: none;">Чаты не найдены</div>
        <div class="no-chats-yet" style="display: none;">У вас пока нет чатов, вы можете начать общение с людьми из ваших
            контактов.
        </div>
        <div class="chats-loading">Загрузка...</div>
    </div>
    <div class="resizer"></div>

    <div class="actual-chat">
        <div class="chat-header" id="chatHeader" style="display: none;">
            <button class="close-chat-btn">
                <svg width="24" height="24" viewBox="28 34 16 16" xmlns="http://www.w3.org/2000/svg"
                     style="transform: rotate(-90deg);">
                    <path d="M24 48 L36 36 L48 48 L43.5 48 L36 40.5 L28.5 48 Z" fill="currentColor"/>
                </svg>
            </button>
            <img src="../static/favicon.ico" alt="avatar" class="chat-avatar">
            <div class="chat-title">Название чата</div>
        </div>
        <div class="chat-header" id="messageOptions">
            <!--            <button id="forwardMessages">Переслать</button>-->
            <button id="deleteMessages">Удалить</button>
        </div>
        <div class="select-chat" id="selectChat">Выберите чат для начала общения.</div>
        <div class="messages-container"></div>
        <div class="no-messages-yet">Здесь ещё нет сообщений</div>
        <div class="join-chat">Присоединиться</div>
        <div class="chat-input" style="display: none;">
            <textarea class="message-input" placeholder="Введите сообщение..." autocomplete="off"></textarea>
            <button class="send-message-btn">
                <svg width="24" height="24" viewBox="28 34 16 16" xmlns="http://www.w3.org/2000/svg">
                    <path d="M24 48 L36 36 L48 48 L43.5 48 L36 40.5 L28.5 48 Z" fill="currentColor"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="ws-status">Подключение...</div>
</div>

<script src="/static/js/visual/resizer.js" type="module"></script>
<script src="/static/js/visual/app_header.js" type="module"></script>
<script src="/static/js/visual/search_lens.js" type="module"></script>
<script src="/static/js/visual/modal.js" type="module"></script>
<script src="/static/js/functional/search_chats.js" type="module"></script>
<script src="/static/js/functional/select_message.js" type="module"></script>
<script src="/static/js/functional/chat_info.js" type="module"></script>
<script src="/static/js/functional/auth/check_auth.js" type="module"></script>
<script src="/static/js/functional/websocket_reconnect.js" type="module"></script>
</body>
</html>
