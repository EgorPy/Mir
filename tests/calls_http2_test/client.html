<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Звонок</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Unbounded:wght@300;400;600&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="shell">
    <div id="join-screen">
        <div class="logo">AudioStream</div>
        <div class="field-group">
            <label>Комната</label>
            <input type="text" id="room-input" placeholder="room-42" autocomplete="off" spellcheck="false">
        </div>
        <div class="field-group">
            <label>Ваш псевдоним</label>
            <input type="text" id="peer-input" placeholder="user-7f3a" autocomplete="off" spellcheck="false">
        </div>
        <button class="btn-primary" id="join-btn">Войти в комнату</button>
    </div>

    <div id="call-screen">
        <div class="call-header">
            <div>
                <div class="room-info">комната</div>
                <div class="room-id" id="hdr-room">—</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
                <div class="room-info" id="hdr-count">0 участников</div>
                <div class="status-dot"></div>
            </div>
        </div>
        <div id="peers-grid"></div>
        <div id="log-box"></div>
        <div class="controls">
            <button class="ctrl-btn active" id="mic-btn">
                <span class="ctrl-icon" id="mic-icon">🎙</span>
                <span id="mic-label">микрофон</span>
                <div class="vol-bar">
                    <div class="vol-fill" id="vol-fill"></div>
                </div>
            </button>
            <button class="ctrl-btn danger" id="hangup-btn">
                <span class="ctrl-icon">📵</span>
                <span>завершить</span>
            </button>
        </div>
    </div>
</div>

<div id="error-overlay">
    <div class="error-code">ERR</div>
    <div class="error-msg" id="error-text"></div>
    <button class="btn-small" onclick="location.reload()">перезагрузить</button>
</div>
<script src="script.js"></script>
</body>
</html>
