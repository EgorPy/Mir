<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Звонок</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Unbounded:wght@300;400;600&display=swap"
          rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --border: #1e1e2e;
            --accent: #2f00ff;
            --accent-dim: #00000000;
            --accent-glow: rgba(64,0,255,0.15);
            --danger: #ff2e2e;
            --danger-dim: rgba(255,59,92,0.12);
            --muted: #3a3a52;
            --text: #e8e8f0;
            --text-dim: #6b6b8a;
            --green: #00ff94;
            --blue: #003cff;
            --mono: 'IBM Plex Mono', monospace;
            --display: 'Unbounded', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Сетка-фон */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
            linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* Угловое свечение */
        body::after {
            content: '';
            position: fixed;
            top: -200px; right: -200px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0,229,255,0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .shell {
            width: 440px;
            position: relative;
            z-index: 1;
        }

        /* ── Экран входа ── */
        #join-screen {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 40px;
            position: relative;
            animation: fadeIn 0.4s ease;
        }

        #join-screen::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .logo {
            font-family: var(--display);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.25em;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo::before {
            content: '';
            display: block;
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent);
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .field-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 10px;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--mono);
            font-size: 14px;
            padding: 12px 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        input[type="text"]::placeholder { color: var(--muted); }

        .btn-primary {
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: var(--display);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 14px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: background 0.2s, box-shadow 0.2s;
            margin-top: 8px;
        }

        .btn-primary:hover {
            background: var(--accent-dim);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-primary:active { transform: scale(0.99); }

        /* ── Экран звонка ── */
        #call-screen {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .call-header {
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom: none;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .call-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--green), transparent);
        }

        .room-info { font-size: 11px; color: var(--text-dim); }
        .room-id { color: var(--accent); font-size: 13px; }

        .status-dot {
            width: 8px; height: 8px;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--green);
            animation: blink 1.5s ease-in-out infinite;
        }

        /* Сетка участников */
        #peers-grid {
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom: none;
            padding: 16px;
            min-height: 120px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
            gap: 8px;
        }

        .peer-tile {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 10px 6px;
            text-align: center;
            font-size: 10px;
            color: var(--text-dim);
            position: relative;
            transition: border-color 0.2s;
        }

        .peer-tile.speaking {
            border-color: var(--accent);
            box-shadow: 0 0 8px var(--accent-dim);
        }

        .peer-tile.me { border-color: var(--blue); }

        .peer-avatar {
            width: 32px; height: 32px;
            background: var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            margin: 0 auto 6px;
            font-family: var(--display);
            font-weight: 600;
            color: var(--text);
        }

        .peer-tile.me .peer-avatar { background: rgba(0,255,148,0.15); color: var(--green); }

        .peer-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 9px;
            letter-spacing: 0.08em;
        }

        .peer-muted-icon {
            position: absolute;
            top: 4px; right: 4px;
            font-size: 8px;
            color: var(--danger);
            display: none;
        }
        .peer-tile.muted .peer-muted-icon { display: block; }

        /* Лог событий */
        #log-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-bottom: none;
            height: 100px;
            overflow-y: auto;
            padding: 10px 14px;
            font-size: 11px;
            color: var(--text-dim);
            line-height: 1.7;
        }

        #log-box::-webkit-scrollbar { width: 4px; }
        #log-box::-webkit-scrollbar-track { background: transparent; }
        #log-box::-webkit-scrollbar-thumb { background: var(--border); }

        .log-entry { display: block; }
        .log-entry .ts { color: var(--muted); margin-right: 8px; }
        .log-entry.sys .msg { color: var(--accent); }
        .log-entry.err .msg { color: var(--danger); }
        .log-entry.ok  .msg { color: var(--green); }

        /* Панель управления */
        .controls {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 16px;
            display: flex;
            gap: 10px;
        }

        .ctrl-btn {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: var(--mono);
            font-size: 11px;
            padding: 12px 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            letter-spacing: 0.05em;
            transition: all 0.15s;
        }

        .ctrl-btn:hover { border-color: var(--text-dim); color: var(--text); }

        .ctrl-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        .ctrl-btn.danger {
            border-color: var(--danger);
            color: var(--danger);
            background: var(--danger-dim);
        }

        .ctrl-btn.danger:hover {
            background: rgba(255,59,92,0.22);
            box-shadow: 0 0 12px rgba(255,59,92,0.2);
        }

        .ctrl-icon { font-size: 18px; }

        /* Индикатор громкости */
        .vol-bar {
            width: 100%;
            height: 2px;
            background: var(--border);
            margin-top: 4px;
            position: relative;
            overflow: hidden;
        }

        .vol-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.05s linear;
        }

        /* Оверлей ошибки */
        #error-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10,10,15,0.92);
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            text-align: center;
        }

        #error-overlay.show { display: flex; }

        .error-code {
            font-family: var(--display);
            font-size: 48px;
            color: var(--danger);
            font-weight: 300;
        }

        .error-msg { color: var(--text-dim); font-size: 13px; max-width: 280px; line-height: 1.6; }

        .btn-small {
            background: transparent;
            border: 1px solid var(--text-dim);
            color: var(--text);
            font-family: var(--mono);
            font-size: 11px;
            padding: 10px 24px;
            cursor: pointer;
            letter-spacing: 0.1em;
            transition: border-color 0.2s;
        }
        .btn-small:hover { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

<div class="shell">

    <!-- ── Экран входа ── -->
    <div id="join-screen">
        <div class="logo">AudioStream</div>

        <div class="field-group">
            <label>Комната</label>
            <input type="text" id="room-input" placeholder="room-42" autocomplete="off" spellcheck="false">
        </div>

        <div class="field-group">
            <label>Ваш псевдоним</label>
            <input type="text" id="peer-input" placeholder="user-7f3a" autocomplete="off" spellcheck="false">
        </div>

        <button class="btn-primary" id="join-btn">Войти в комнату</button>
    </div>

    <!-- ── Экран звонка ── -->
    <div id="call-screen">
        <div class="call-header">
            <div>
                <div class="room-info">комната</div>
                <div class="room-id" id="hdr-room">—</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
                <div class="room-info" id="hdr-count">0 участников</div>
                <div class="status-dot" id="conn-dot"></div>
            </div>
        </div>

        <!-- Сетка участников -->
        <div id="peers-grid"></div>

        <!-- Лог -->
        <div id="log-box"></div>

        <!-- Управление -->
        <div class="controls">
            <button class="ctrl-btn active" id="mic-btn">
                <span class="ctrl-icon" id="mic-icon">🎙</span>
                <span id="mic-label">микрофон</span>
                <div class="vol-bar">
                    <div class="vol-fill" id="vol-fill"></div>
                </div>
            </button>
            <button class="ctrl-btn" id="hangup-btn" onclick="hangUp()">
                <span class="ctrl-icon">📵</span>
                <span>завершить</span>
            </button>
        </div>
    </div>

</div>

<!-- Оверлей ошибки -->
<div id="error-overlay">
    <div class="error-code">ERR</div>
    <div class="error-msg" id="error-text"></div>
    <button class="btn-small" onclick="location.reload()">перезагрузить</button>
</div>

<script>
    // ============================================================================
    // КОНФИГУРАЦИЯ
    // ============================================================================

    const CONFIG = {
        // URL сервера. В продакшне замените на https://ваш-домен.com
        serverUrl: "http://localhost:8000",

        // Интервал отправки аудио-чанков (мс)
        // 60 мс → ~16 POST-запросов в секунду (нормально для fetch)
        sendIntervalMs: 60,

        // Таймаут одного POST /send (мс). Если сервер не отвечает за это время —
        // чанк пропускается, но соединение не рвётся
        sendTimeoutMs: 3000,

        // Аудио-параметры MediaRecorder
        // audio/webm;codecs=opus — Opus в контейнере WebM, поддерживается в Chrome/Firefox
        mimeType: "audio/webm;codecs=opus",
        audioBitsPerSecond: 32000,  // 32 kbps — нормальное качество речи
    };

    // ============================================================================
    // СОСТОЯНИЕ
    // ============================================================================

    let callId = "";
    let myPeerId = "";
    let isMuted = false;

    let mediaStream = null;       // MediaStream с микрофоном
    let mediaRecorder = null;     // MediaRecorder, пишет аудио
    let sendInterval = null;      // setInterval для отправки чанков

    let eventSource = null;       // EventSource (SSE) для сигналинга
    let recvController = null;    // AbortController для GET /recv
    let recvReader = null;        // ReadableStreamDefaultReader для /recv

    const peers = {};             // { peer_id: { el: DOM-элемент, audioCtx, gainNode } }

    // AnalyserNode для отображения уровня громкости своего микрофона
    let analyser = null;
    let volAnimId = null;

    // ============================================================================
    // СТАРТ
    // ============================================================================

    document.getElementById("join-btn").addEventListener("click", joinCall);

    // Enter в полях ввода тоже запускает вход
    ["room-input", "peer-input"].forEach(id =>
    document.getElementById(id).addEventListener("keydown", e => {
        if (e.key === "Enter") joinCall();
    })
    );

    // Случайные значения по умолчанию
    document.getElementById("room-input").value = "room-" + Math.random().toString(36).slice(2, 6);
    document.getElementById("peer-input").value = "user-" + Math.random().toString(36).slice(2, 6);

    // ============================================================================
    // ВХОД В КОМНАТУ
    // ============================================================================

    async function joinCall() {
        callId   = document.getElementById("room-input").value.trim();
        myPeerId = document.getElementById("peer-input").value.trim();

        if (!callId || !myPeerId) {
            showError("Заполните оба поля");
            return;
        }

        log("sys", `Запрашиваем доступ к микрофону...`);

        // 1. Получаем микрофон
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    echoCancellation: true,   // Убирает эхо
                    noiseSuppression: true,   // Подавление шума
                    sampleRate: 48000,        // Opus работает лучше на 48 кГц
                },
                video: false,               // Видео пока не нужно
            });
        } catch (e) {
            showError(`Нет доступа к микрофону: ${e.message}`);
            return;
        }

        log("ok", "Микрофон получен");

        // 2. Переключаем UI
        document.getElementById("join-screen").style.display = "none";
        document.getElementById("call-screen").style.display = "block";
        document.getElementById("hdr-room").textContent = callId;

        // 3. Добавляем себя в сетку
        addPeerTile(myPeerId, true);

        // 4. Запускаем анализатор громкости
        setupVolumeAnalyser();

        // 5. Подключаемся к SSE (сигналинг)
        connectSignaling();

        // 6. Запускаем получение аудио
        connectRecvStream();

        // 7. Запускаем запись и отправку аудио
        startSending();
    }

    // ============================================================================
    // SSE — СИГНАЛИНГ (кто зашёл / вышел / замьютил)
    // ============================================================================

    function connectSignaling() {
        // EventSource автоматически переподключается при обрыве!
        // Это встроенное поведение браузера — не нужно писать логику реконнекта.
        eventSource = new EventSource(`${CONFIG.serverUrl}/events/${callId}/${myPeerId}`);

        // Сервер прислал подтверждение входа + список уже присутствующих
        eventSource.addEventListener("joined", e => {
            const data = JSON.parse(e.data);
            log("ok", `В комнате: ${data.peers.length ? data.peers.join(", ") : "только вы"}`);
            data.peers.forEach(pid => { if (pid !== myPeerId) addPeerTile(pid); });
            updateCount();
        });

        // Кто-то зашёл
        eventSource.addEventListener("peer_joined", e => {
            const { peer_id } = JSON.parse(e.data);
            if (peer_id !== myPeerId) {
                addPeerTile(peer_id);
                log("sys", `→ ${peer_id} вошёл`);
                updateCount();
            }
        });

        // Кто-то вышел
        eventSource.addEventListener("peer_left", e => {
            const { peer_id } = JSON.parse(e.data);
            removePeerTile(peer_id);
            log("sys", `← ${peer_id} вышел`);
            updateCount();
        });

        // Кто-то замьютился
        eventSource.addEventListener("peer_muted", e => {
            const { peer_id, muted } = JSON.parse(e.data);
            setPeerMuted(peer_id, muted);
            log("sys", `${peer_id} ${muted ? "замьютился" : "включил микрофон"}`);
        });

        eventSource.onerror = () => {
            // EventSource сам переподключится, просто логируем
            log("err", "SSE: переподключение...");
        };
    }

    // ============================================================================
    // GET /recv — ПОЛУЧЕНИЕ АУДИО ПОТОКОМ
    // ============================================================================

    async function connectRecvStream() {
        recvController = new AbortController();

        try {
            const resp = await fetch(`${CONFIG.serverUrl}/recv/${callId}/${myPeerId}`, {
                signal: recvController.signal,
                // Явно просим браузер не буферизировать
                headers: { "Accept": "application/octet-stream" },
            });

            if (!resp.ok) {
                log("err", `recv HTTP ${resp.status}`);
                setTimeout(connectRecvStream, 2000);
                return;
            }

            // ReadableStream — браузерное API для чтения байтового потока кусками
            recvReader = resp.body.getReader();
            log("ok", "Аудиопоток открыт");

            // Буфер: накапливаем байты и извлекаем пакеты по length-prefix протоколу
            let buf = new Uint8Array(0);

            while (true) {
                const { value, done } = await recvReader.read();
                if (done) break;

                // Дописываем новые байты в буфер
                buf = concat(buf, value);

                // Разбираем все полные пакеты из буфера
                while (buf.length >= 4) {
                    // Читаем 4-байтовый big-endian length prefix
                    const packetLen = (buf[0] << 24) | (buf[1] << 16) | (buf[2] << 8) | buf[3];

                    if (packetLen === 0) {
                        // Keepalive — просто выбрасываем 4 байта
                        buf = buf.slice(4);
                        continue;
                    }

                    if (buf.length < 4 + packetLen) {
                        // Пакет ещё не дошёл полностью — ждём следующего chunk
                        break;
                    }

                    // Извлекаем один полный пакет
                    const packet = buf.slice(4, 4 + packetLen);
                    buf = buf.slice(4 + packetLen);

                    // Разбираем формат: [1 байт: длина peer_id][peer_id][аудио]
                    const idLen = packet[0];
                    const peerId = new TextDecoder().decode(packet.slice(1, 1 + idLen));
                    const audioData = packet.slice(1 + idLen);

                    playAudio(peerId, audioData);
                }
            }

        } catch (e) {
            if (e.name === "AbortError") return; // Намеренно прервали (hangUp)
            log("err", `recv обрыв: ${e.message}`);
            setTimeout(connectRecvStream, 2000); // Переподключаемся
        }
    }

    // Склеивает два Uint8Array в один (аналог Buffer.concat в Node)
    function concat(a, b) {
        const c = new Uint8Array(a.length + b.length);
        c.set(a, 0);
        c.set(b, a.length);
        return c;
    }

    // ============================================================================
    // POST /send — ОТПРАВКА АУДИО
    // ============================================================================

    function startSending() {
        // MediaRecorder записывает аудио и по событию dataavailable отдаёт Blob
        // timeslice: 60 мс — получаем чанк каждые 60 мс
        let pendingChunks = [];

        mediaRecorder = new MediaRecorder(mediaStream, {
            mimeType: CONFIG.mimeType,
            audioBitsPerSecond: CONFIG.audioBitsPerSecond,
        });

        // Каждые 60 мс прилетает blob с аудио
        mediaRecorder.addEventListener("dataavailable", async e => {
            if (e.data.size === 0 || isMuted) return;
            pendingChunks.push(e.data);
        });

        mediaRecorder.start(CONFIG.sendIntervalMs);

        // Отправляем накопленные чанки
        sendInterval = setInterval(async () => {
            if (!pendingChunks.length) return;
            const chunk = pendingChunks.shift();
            const arrayBuf = await chunk.arrayBuffer();

            // Используем keepalive: true — это гарантирует, что запрос дойдёт даже
            // если пользователь закроет вкладку
            fetch(`${CONFIG.serverUrl}/send/${callId}/${myPeerId}`, {
                method: "POST",
                body: arrayBuf,
                headers: { "Content-Type": "application/octet-stream" },
                signal: AbortSignal.timeout(CONFIG.sendTimeoutMs),
            }).catch(() => {}); // Потеря одного чанка не критична

        }, CONFIG.sendIntervalMs);
    }

    // ============================================================================
    // ВОСПРОИЗВЕДЕНИЕ АУДИО
    // ============================================================================

    // Для каждого пира создаём отдельный AudioContext.
    // Web Audio API позволяет декодировать сырые Opus/WebM байты прямо в браузере.

    async function playAudio(peerId, audioBytes) {
        if (!peers[peerId]) return;

        let peer = peers[peerId];

        // Создаём AudioContext при первом аудио (браузер требует user gesture)
        if (!peer.audioCtx) {
            peer.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            peer.gainNode = peer.audioCtx.createGain();
            peer.gainNode.connect(peer.audioCtx.destination);
        }

        const ctx = peer.audioCtx;

        try {
            // decodeAudioData декодирует WebM/Opus Blob → AudioBuffer (PCM)
            const audioBuffer = await ctx.decodeAudioData(audioBytes.buffer.slice(
                audioBytes.byteOffset, audioBytes.byteOffset + audioBytes.byteLength
            ));

            // Создаём источник и воспроизводим
            const source = ctx.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(peer.gainNode);
            source.start();

            // Подсвечиваем тайл "говорящего"
            highlightSpeaker(peerId);

        } catch (e) {
            // Первый WebM-чанк иногда декодируется с ошибкой — это нормально
            // (нет заголовка WebM). Просто пропускаем.
        }
    }

    // ============================================================================
    // УПРАВЛЕНИЕ
    // ============================================================================

    document.getElementById("mic-btn").addEventListener("click", toggleMute);

    function toggleMute() {
        isMuted = !isMuted;

        // Включаем/выключаем аудио-трек (не останавливаем запись, просто тишим)
        mediaStream.getAudioTracks().forEach(t => (t.enabled = !isMuted));

        const btn = document.getElementById("mic-btn");
        const icon = document.getElementById("mic-icon");
        const label = document.getElementById("mic-label");

        if (isMuted) {
            btn.classList.remove("active");
            icon.textContent = "🔇";
            label.textContent = "мьют";
            setPeerMuted(myPeerId, true);
        } else {
            btn.classList.add("active");
            icon.textContent = "🎙";
            label.textContent = "микрофон";
            setPeerMuted(myPeerId, false);
        }

        // Уведомляем других о mute
        fetch(`${CONFIG.serverUrl}/signal/${callId}/${myPeerId}`, {
            method: "POST",
            body: JSON.stringify({ type: "mute", muted: isMuted }),
            headers: { "Content-Type": "application/json" },
        }).catch(() => {});
    }

    function hangUp() {
        // Останавливаем всё
        if (sendInterval) clearInterval(sendInterval);
        if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        if (eventSource) eventSource.close();
        if (recvController) recvController.abort();
        if (volAnimId) cancelAnimationFrame(volAnimId);

        // Закрываем AudioContext для всех пиров
        Object.values(peers).forEach(p => { if (p.audioCtx) p.audioCtx.close(); });

        location.reload();
    }

    // ============================================================================
    // АНАЛИЗАТОР ГРОМКОСТИ (своего микрофона)
    // ============================================================================

    function setupVolumeAnalyser() {
        const audioCtx = new AudioContext();
        const source = audioCtx.createMediaStreamSource(mediaStream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);

        const data = new Uint8Array(analyser.frequencyBinCount);
        const fill = document.getElementById("vol-fill");

        function update() {
            analyser.getByteFrequencyData(data);
            // Среднее значение по всем частотам → процент заполнения
            const avg = data.reduce((a, b) => a + b, 0) / data.length;
            fill.style.width = Math.min(100, avg / 2) + "%";
            volAnimId = requestAnimationFrame(update);
        }
        update();
    }

    // ============================================================================
    // UI-хелперы
    // ============================================================================

    function addPeerTile(peerId, isMe = false) {
        if (peers[peerId]) return;

        const tile = document.createElement("div");
        tile.className = "peer-tile" + (isMe ? " me" : "");
        tile.id = `tile-${peerId}`;
        tile.innerHTML = `
    <div class="peer-avatar">${peerId[0].toUpperCase()}</div>
    <div class="peer-name">${peerId}</div>
    <span class="peer-muted-icon">🔇</span>
  `;

        document.getElementById("peers-grid").appendChild(tile);
        peers[peerId] = { el: tile, audioCtx: null, gainNode: null };
    }

    function removePeerTile(peerId) {
        const p = peers[peerId];
        if (!p) return;
        if (p.audioCtx) p.audioCtx.close();
        p.el.remove();
        delete peers[peerId];
    }

    function setPeerMuted(peerId, muted) {
        const p = peers[peerId];
        if (!p) return;
        p.el.classList.toggle("muted", muted);
    }

    let speakerTimers = {};
    function highlightSpeaker(peerId) {
        const p = peers[peerId];
        if (!p) return;
        p.el.classList.add("speaking");
        clearTimeout(speakerTimers[peerId]);
        speakerTimers[peerId] = setTimeout(() => p.el.classList.remove("speaking"), 300);
    }

    function updateCount() {
        const n = Object.keys(peers).length;
        document.getElementById("hdr-count").textContent = `${n} участник${n===1?"":"ов"}`;
    }

    function log(type, msg) {
        const box = document.getElementById("log-box");
        const ts = new Date().toLocaleTimeString("ru", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
        const el = document.createElement("span");
        el.className = `log-entry ${type}`;
        el.innerHTML = `<span class="ts">${ts}</span><span class="msg">${msg}</span>`;
        box.appendChild(el);
        box.scrollTop = box.scrollHeight;
    }

    function showError(msg) {
        document.getElementById("error-text").textContent = msg;
        document.getElementById("error-overlay").classList.add("show");
    }
</script>
</body>
</html>
